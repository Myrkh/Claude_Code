<script>
/* ============================================================================
   SHARED UTILS — theme toggle, tabs switcher, copy button
   These are identical across every component page.
   ============================================================================ */

/* --- Theme init from localStorage or system --- */
(function initTheme() {
  let t = 'light';
  try {
    const s = localStorage.getItem('stit-lab-theme');
    if (s === 'light' || s === 'dark') t = s;
    else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) t = 'dark';
  } catch (e) {}
  document.documentElement.setAttribute('data-theme', t);
})();

/* --- Theme toggle with View Transitions radial morph --- */
function toggleTheme(event) {
  const cx = event?.clientX ?? window.innerWidth / 2;
  const cy = event?.clientY ?? window.innerHeight / 2;
  document.documentElement.style.setProperty('--cx', cx + 'px');
  document.documentElement.style.setProperty('--cy', cy + 'px');

  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';

  function apply() {
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('stit-lab-theme', next); } catch (e) {}
  }

  if (!document.startViewTransition || matchMedia('(prefers-reduced-motion: reduce)').matches) {
    apply();
  } else {
    document.startViewTransition(() => apply());
  }
}

/* --- Tabs switcher with flowing indicator --- */
(function initTabs() {
  const root = document.getElementById('tabs');
  if (!root) return;
  const indicator = document.getElementById('tab-indicator');
  const tabs = root.querySelectorAll('.comp-tab');
  const panels = document.querySelectorAll('.panel');

  function moveIndicator(btn) {
    const r = btn.getBoundingClientRect();
    const rootR = root.getBoundingClientRect();
    indicator.style.width = r.width + 'px';
    indicator.style.transform = `translateX(${r.left - rootR.left - 4}px)`;
  }

  function setTab(name) {
    const btn = root.querySelector(`[data-panel="${name}"]`);
    if (!btn) return;
    tabs.forEach(t => t.classList.toggle('active', t === btn));
    panels.forEach(p => p.classList.toggle('active', p.dataset.panel === name));
    moveIndicator(btn);
  }

  tabs.forEach(t => t.addEventListener('click', () => setTab(t.dataset.panel)));
  requestAnimationFrame(() => moveIndicator(root.querySelector('.comp-tab.active')));
  window.addEventListener('resize', () => {
    moveIndicator(root.querySelector('.comp-tab.active'));
  });
})();

/* --- Copy the code block to clipboard --- */
function copyCode(btn) {
  const code = document.getElementById('code-block');
  if (!code) return;
  const text = code.textContent;
  navigator.clipboard?.writeText(text);
  const orig = btn.textContent;
  btn.classList.add('copied');
  btn.textContent = 'Copied';
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('copied');
  }, 1500);
}

/* ============================================================================
   COMPONENT-SPECIFIC JS — put component logic below this line
   ============================================================================ */

// {{REPLACE: your component JS here}}
</script>
