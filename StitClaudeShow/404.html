<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
<meta name="theme-color" content="#faf7f0" />
<meta name="description" content="404 · Cette couture n'existe pas. This stitch does not exist." />
<title>404 · Stit'Claude</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;450;500;550;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="assets/theme.css" />

<style>
  html { font-optical-sizing: auto; hanging-punctuation: first last; }
  body {
    background: var(--bg);
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: var(--space-8) var(--gutter);
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid background, same vocabulary as morphing-liquid-nav stage */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, color-mix(in oklch, var(--fg) 4%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklch, var(--fg) 4%, transparent) 1px, transparent 1px);
    background-size: 32px 32px;
    background-position: center center;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent 75%);
    pointer-events: none;
    opacity: 0.6;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 740px;
    width: 100%;
  }

  /* ============================================================
     THE UNRAVELING STITCH — a visual of a torn seam
     ============================================================ */
  .stitch-svg {
    width: 100%;
    max-width: 540px;
    height: auto;
    margin: 0 auto var(--space-10);
    display: block;
    color: var(--fg);
    opacity: 0.9;
  }
  .stitch-thread {
    stroke: currentColor;
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .stitch-mark {
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 4px color-mix(in oklch, var(--accent) 70%, transparent));
  }
  .stitch-fade {
    stroke: currentColor;
    stroke-dasharray: 1 5;
    stroke-width: 1;
    fill: none;
    opacity: 0.4;
  }

  /* Animate the unraveling on page load */
  .stitch-svg .thread-main {
    stroke-dasharray: 500;
    stroke-dashoffset: 0;
    animation: draw-thread 1600ms var(--ease-decelerate) both;
  }
  .stitch-svg .thread-loose {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: unravel 1200ms var(--ease-decelerate) 1200ms both;
  }
  .stitch-svg .thread-mark {
    opacity: 0;
    animation: mark-appear 600ms var(--ease-decelerate) 1600ms both;
  }
  @keyframes draw-thread {
    from { stroke-dashoffset: 500; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes unravel {
    from { stroke-dashoffset: 120; opacity: 0; }
    to   { stroke-dashoffset: 0; opacity: 0.5; }
  }
  @keyframes mark-appear {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ============================================================
     META ROW — the 404 code
     ============================================================ */
  .meta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: var(--space-8);
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: color-mix(in oklch, var(--bg) 60%, transparent);
  }
  .meta .code {
    color: var(--accent);
    font-weight: 500;
  }
  .meta .sep {
    width: 14px; height: 1px;
    background: var(--border-strong);
  }

  /* ============================================================
     THE TITLE — bilingual, editorial
     ============================================================ */
  .title {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(2.75rem, 7vw, 5.5rem);
    line-height: 0.95;
    letter-spacing: -0.035em;
    color: var(--fg);
    max-width: 18ch;
    margin: 0 auto var(--space-5);
    text-wrap: balance;
  }

  .title-en {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: var(--fg-subtle);
    letter-spacing: -0.005em;
    margin-bottom: var(--space-10);
    position: relative;
    display: inline-block;
    padding: 0 var(--space-3);
  }
  .title-en::before,
  .title-en::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 28px;
    height: 1px;
    background: var(--border-strong);
  }
  .title-en::before { right: 100%; }
  .title-en::after { left: 100%; }

  /* ============================================================
     LEDE — the explanation, gentle
     ============================================================ */
  .lede {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    line-height: 1.5;
    color: var(--fg-muted);
    max-width: 44ch;
    margin: 0 auto var(--space-10);
    text-wrap: balance;
  }

  /* ============================================================
     ACTIONS — the way out
     ============================================================ */
  .actions {
    display: flex;
    gap: var(--space-3);
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: var(--radius-pill);
    font-size: var(--step--1);
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition:
      background var(--duration-fast) var(--ease-standard),
      border-color var(--duration-fast) var(--ease-standard),
      color var(--duration-fast) var(--ease-standard),
      transform var(--duration-normal) var(--ease-spring-smooth);
    white-space: nowrap;
    text-decoration: none;
  }
  .btn svg {
    width: 14px; height: 14px;
    transition: transform var(--duration-normal) var(--ease-standard);
  }
  .btn-primary {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .btn-primary:hover { background: var(--fg-muted); border-color: var(--fg-muted); }
  .btn-primary:hover svg { transform: translateX(-3px); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-outline {
    color: var(--fg);
    border-color: var(--border-strong);
    background: transparent;
  }
  .btn-outline:hover {
    background: var(--surface);
    border-color: var(--fg-muted);
  }

  /* ============================================================
     FOOTER — small, editorial
     ============================================================ */
  .colophon {
    margin-top: clamp(4rem, 8vw, 7rem);
    padding-top: var(--space-6);
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    max-width: 740px;
    margin-inline: auto;
  }
  .colophon em {
    font-family: var(--font-serif);
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
    color: var(--fg-muted);
  }
  .colophon .dot {
    width: 3px; height: 3px;
    background: var(--fg-subtle);
    border-radius: 50%;
  }

  /* Theme toggle — lives top-right, small */
  .theme-toggle-btn {
    position: fixed;
    top: var(--space-4);
    right: var(--space-4);
    z-index: 50;
    width: 34px; height: 34px;
    display: inline-grid; place-items: center;
    border-radius: var(--radius-pill);
    color: var(--fg-muted);
    background: color-mix(in oklch, var(--bg) 70%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    cursor: pointer;
    transition:
      background var(--duration-fast),
      color var(--duration-fast),
      border-color var(--duration-fast);
  }
  .theme-toggle-btn:hover {
    background: var(--surface);
    color: var(--fg);
    border-color: var(--fg-muted);
  }
  .theme-toggle-btn svg { width: 14px; height: 14px; }
  [data-theme="light"] .moon-icon { display: block; }
  [data-theme="light"] .sun-icon { display: none; }
  [data-theme="dark"] .moon-icon { display: none; }
  [data-theme="dark"] .sun-icon { display: block; }

  /* View transitions */
  ::view-transition-old(root), ::view-transition-new(root) { animation: none; mix-blend-mode: normal; }
  ::view-transition-old(root) { z-index: 1; }
  ::view-transition-new(root) {
    z-index: 2;
    animation: theme-reveal 820ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes theme-reveal {
    from { clip-path: circle(0% at var(--cx, 50%) var(--cy, 50%)); }
    to   { clip-path: circle(150% at var(--cx, 50%) var(--cy, 50%)); }
  }

  /* Staggered entrance */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .meta, .title, .title-en, .lede, .actions, .colophon {
    opacity: 0;
    animation: fade-up var(--duration-slow) var(--ease-decelerate) forwards;
  }
  .meta       { animation-delay:  100ms; }
  .title      { animation-delay:  400ms; }
  .title-en   { animation-delay:  650ms; }
  .lede       { animation-delay:  850ms; }
  .actions    { animation-delay: 1050ms; }
  .colophon   { animation-delay: 1350ms; }
</style>
</head>

<body>

<button class="theme-toggle-btn" onclick="toggleTheme(event)" aria-label="Toggle theme">
  <svg class="moon-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
    <path d="M13.5 9.5 A6 6 0 1 1 6.5 2.5 A5 5 0 0 0 13.5 9.5 Z" />
  </svg>
  <svg class="sun-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
    <circle cx="8" cy="8" r="3" />
    <path d="M8 1 V3 M8 13 V15 M1 8 H3 M13 8 H15 M3.2 3.2 L4.6 4.6 M11.4 11.4 L12.8 12.8 M3.2 12.8 L4.6 11.4 M11.4 4.6 L12.8 3.2" />
  </svg>
</button>

<div class="content">

  <!-- =================================================================
       THE UNRAVELING STITCH
       A horizontal thread with running-stitch marks,
       that fades and comes undone on the right side.
       ================================================================= -->
  <svg class="stitch-svg" viewBox="0 0 540 160" fill="none" aria-hidden="true">

    <!-- Main taut thread (the running stitch going through "fabric") -->
    <path class="stitch-thread thread-main" d="
      M 20 80
      L 60 80
      M 72 80
      L 112 80
      M 124 80
      L 164 80
      M 176 80
      L 216 80
      M 228 80
      L 268 80
      M 280 80
      L 320 80
    " />

    <!-- The "X" cross-stitch mark where the seam starts to unravel — coral -->
    <g class="stitch-mark thread-mark">
      <line x1="324" y1="74" x2="336" y2="86" />
      <line x1="336" y1="74" x2="324" y2="86" />
    </g>

    <!-- The thread coming undone — curls and loosens -->
    <path class="stitch-thread thread-loose" d="
      M 340 80
      Q 370 80 380 90
      Q 392 102 410 98
      Q 428 94 438 110
      Q 448 126 468 118
      Q 485 112 500 128
    " />

    <!-- Faint extension, dashed — the thread that's truly gone -->
    <path class="stitch-fade thread-loose" d="
      M 505 130
      Q 515 136 524 132
    " stroke-linecap="round" />

    <!-- Dotted implied fabric line — where the stitch should have continued -->
    <path class="stitch-fade thread-loose" d="
      M 340 80
      L 524 80
    " />

  </svg>

  <!-- =================================================================
       META
       ================================================================= -->
  <span class="meta">
    <span class="code">ERROR 404</span>
    <span class="sep"></span>
    <span>Stitch not found</span>
  </span>

  <!-- =================================================================
       TITLE — bilingual
       ================================================================= -->
  <h1 class="title">Cette couture n'existe pas.</h1>
  <p class="title-en">This stitch does not exist.</p>

  <!-- =================================================================
       LEDE
       ================================================================= -->
  <p class="lede">
    The page you're looking for may have been unraveled, or it never existed.
    The thread stops here.
  </p>

  <!-- =================================================================
       ACTIONS
       ================================================================= -->
  <div class="actions">
    <a class="btn btn-primary" href="index.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M13 8 L3 8 M7 4 L3 8 L7 12" />
      </svg>
      Return home
    </a>
    <a class="btn btn-outline" href="lab.html">Enter the Lab</a>
  </div>

  <!-- =================================================================
       COLOPHON
       ================================================================= -->
  <footer class="colophon">
    <em>On ne fait plus de pages comme ça aujourd'hui.</em>
    <span class="dot"></span>
    <span>Stit'Claude · MMXXVI</span>
  </footer>

</div>

<script>
  (function initTheme() {
    let t = 'light';
    try {
      const s = localStorage.getItem('stit-lab-theme');
      if (s === 'light' || s === 'dark') t = s;
      else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) t = 'dark';
    } catch (e) {}
    document.documentElement.setAttribute('data-theme', t);
  })();
  function toggleTheme(event) {
    const cx = event?.clientX ?? window.innerWidth / 2;
    const cy = event?.clientY ?? window.innerHeight / 2;
    document.documentElement.style.setProperty('--cx', cx + 'px');
    document.documentElement.style.setProperty('--cy', cy + 'px');
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    function apply() {
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('stit-lab-theme', next); } catch (e) {}
    }
    if (!document.startViewTransition || matchMedia('(prefers-reduced-motion: reduce)').matches) apply();
    else document.startViewTransition(() => apply());
  }
</script>

</body>
</html>
